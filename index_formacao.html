<!DOCTYPE html>
<html lang="pt-br">
<head>
    <link rel="icon" type="image/png" href="imagens/icon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title class="title">Formação Academica/Titulação</title>
    <link rel="stylesheet" href="site/style_title.css">
    <style>
        body {
            background-color: green;
            margin: 0;
            font-family: Arial, sans-serif;
        }

        .container-main {
            background-color: #5cb85c;
            width: 70%;
            margin: 30px auto;
            padding: 20px;
            box-shadow: 0 0 10px black;
        }

        .title {
            color: black;
            text-shadow: 
                -1px -1px 0 green,  
                 1px -1px 0 green,
                -1px  1px 0 green,
                 1px  1px 0 green;
            padding: 10px;
            text-align: center;
            font-size: 2em;
            border: 5px solid green;
            background-color: black;
            margin-bottom: 20px;
        }

        .links a {
            color: black;
            text-decoration: none;
            text-shadow: 
                -1px -1px 0 green,  
                 1px -1px 0 green,
                -1px  1px 0 green,
                 1px  1px 0 green;
        }

        .links a:hover {
            text-decoration: underline;
        }

        .back-button {
            width: 50px;
            height: auto;
            position: absolute;
            right: 20px;
            bottom: 20px;
        }

        .back-button-container {
            position: relative;
            height: 60px;
        }
    </style>
</head>
<body>
    <div class="container-main">
        <header>
            <h1 class="title">Formação Academica/Titulação</h1>
        </header>
        <article>
            <p>Em desenvolvimento.</p>
            <ul class="links">
                <li><a href="https://github.com/enrzan/Pyton_GoogleColab" target="_blank" rel="noopener noreferrer">Exemplo de hiperlink</a></li>
            </ul>
        </article>
        <div class="back-button-container">
            <a href="index.html">
                <img src="imagens/Round-Back-Button-PNG-Image-Background.png" alt="Voltar" class="back-button">
            </a>
        </div>
    </div>
</body>
</html>
